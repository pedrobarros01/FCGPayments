  #     context: .
  #   restart: always
  #   depends_on:
  #     - postgres
  #     - rabbitmq  
  #     - pgadmin
  #   networks:
  #     - fcgpayment-net




volumes:
  dados-postgres: {}
  rabbitmq_data: {}
  rabbitmq_logs: {}
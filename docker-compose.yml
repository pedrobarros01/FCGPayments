

networks:
  fcgpayment-net:
    driver: bridge

services:
  
  postgres:
    image: postgres:14.23-alpine3.24
    ports:
      - 5432:5432
    volumes:
      - dados-postgres:/var/lib/postgresql/data
    restart: always
    environment:
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: "senha"
    networks:
      - fcgpayment-net

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "80:80"
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: "email@email.com"
      PGADMIN_DEFAULT_PASSWORD: "senha"
    restart: always
    networks:
      - fcgpayment-net

  rabbitmq:
    image: rabbitmq:4.3.2-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    networks:
      - fcgpayment-net
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "user"
      RABBITMQ_DEFAULT_PASS: "senha"
      RABBITMQ_DEFAULT_VHOST: "my_vhost"

  # fcgpayment:
